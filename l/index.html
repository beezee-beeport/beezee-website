<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BeeZee — Open in App</title>
  <meta name="description" content="Open BeeZee. Get the app if you don't have it yet.">
  <meta name="theme-color" content="#1A2744">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1A2744;
      --amber: #F5A623;
      --amber-deep: #E8940E;
      --white: #FFFFFF;
      --off-white: #F9FAFB;
      --text-gray: #4B5563;
      --light-gray: #9CA3AF;
      --border: #E5E7EB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      background: var(--white);
      color: var(--text-gray);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 96px;
      height: auto;
      margin-bottom: 16px;
    }
    .wordmark {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .wordmark .bee { color: var(--amber); }
    .wordmark .zee { color: var(--navy); }
    .tagline {
      color: var(--text-gray);
      font-size: 16px;
      margin-bottom: 32px;
    }
    .cta {
      display: inline-block;
      padding: 14px 32px;
      background: var(--amber);
      color: var(--navy);
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      border-radius: 10px;
      transition: background 0.15s ease;
    }
    .cta:hover { background: var(--amber-deep); }
    .help {
      margin-top: 24px;
      font-size: 14px;
      color: var(--light-gray);
    }
    .help a {
      color: var(--text-gray);
      text-decoration: none;
      border-bottom: 1px dotted var(--light-gray);
    }
    .help a:hover { color: var(--amber); }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/img/beezee-logo-dark.png" alt="BeeZee" class="logo" onerror="this.style.display='none'">
    <div class="wordmark"><span class="bee">Bee</span><span class="zee">Zee</span></div>
    <p class="tagline">Blue-collar hiring, simplified</p>

    <a href="/download.html" class="cta">Get the BeeZee App</a>

    <p class="help">
      If you already have the app installed, open it from your home screen.<br>
      Need help? <a href="mailto:support@beezee.co.in">support@beezee.co.in</a>
    </p>
  </div>
</body>
</html>
